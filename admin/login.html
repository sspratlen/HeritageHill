<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Heritage Hill Church</title>
  <link rel="icon" href="../assets/logos/logo-icon-color-white.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #BC7A1E;
      --primary-dark: #9A6118;
      --dark: #0D0F14;
      --border: #E4E4E4;
      --bg-soft: #F7F7F5;
      --text: #1C1C1E;
      --text-muted: #6B6B6B;
      --error: #ef4444;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 52px;
      
    }
    .login-logo span {
      display: block;
      color: rgba(255,255,255,.6);
      font-size: .875rem;
      margin-top: 8px;
      letter-spacing: .05em;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-card h2 { font-size: 1.4rem; color: var(--text); margin-bottom: .35rem; }
    .login-card p { font-size: .9rem; color: var(--text-muted); margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: .7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9375rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(188,122,30,.15); }
    .btn-login {
      width: 100%;
      padding: .8rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-login:active { transform: none; }
    .error-msg {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--error);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .875rem;
      margin-top: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .back-link {
      display: block;
      text-align: center;
      color: rgba(255,255,255,.4);
      font-size: .85rem;
      margin-top: 20px;
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: rgba(255,255,255,.7); }
    .hint {
      margin-top: 18px;
      padding: 12px;
      background: var(--bg-soft);
      border-radius: 8px;
      font-size: .8rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .hint strong { color: var(--text); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <img src="../assets/logos/logo-left-full-dark.png"
         alt="Heritage Hill Church"
         onerror="this.style.display='none'; this.nextElementSibling.style.color='#fff'; this.nextElementSibling.style.fontWeight='700'; this.nextElementSibling.style.fontSize='1.4rem';" />
    <span>Admin Portal</span>
  </div>

  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Sign in to manage events and small groups.</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="emailInput">Email Address</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>
    </form>
  </div>

  <a href="../index.html" class="back-link">← Back to Heritage Hill Website</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/db.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    const user = await SupaDB.getUser();
    if (user) {
      const redirect = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
      window.location.href = redirect;
    }
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('password').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('errorMsg');

    btn.textContent = 'Signing in…';
    btn.disabled = true;
    err.classList.remove('show');

    const { error } = await SupaDB.signIn(email, pass);
    if (error) {
      err.textContent = error.message || 'Incorrect email or password. Please try again.';
      err.classList.add('show');
      btn.textContent = 'Sign In';
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    } else {
      const redirect = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
      window.location.href = redirect;
    }
  }
</script>
</body>
</html>
